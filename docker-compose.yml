# Build from source in this folder. Deploy code changes with:
#   docker compose up -d --build
# The build context is this directory (must contain the Dockerfile). The built
# image is also tagged, so a remote host can `docker compose push` / pull it.
# For a prebuilt-image-only workflow, drop `build: .` and keep just `image:`.
services:
  connector-ransomwarelive-enrichment:
    build: .
    image: opencti-ransomwarelive-enrichment:1.0
    environment:
      # --- OpenCTI core ---
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}          # or a dedicated connector-user token
      # --- Connector core ---
      - CONNECTOR_ID=CHANGE_ME-generate-a-uuidv4
      - CONNECTOR_NAME=Ransomware.live PRO Enrichment
      - CONNECTOR_SCOPE=intrusion-set,tool,attack-pattern,vulnerability,indicator
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_DURATION_PERIOD=P1D                  # daily; keep PRO call budget in mind
      # --- ransomware.live PRO ---
      - RANSOMWARELIVE_API_KEY=${RANSOMWARELIVE_API_KEY}
      - RANSOMWARELIVE_BASE_URL=https://api-pro.ransomware.live
      - RANSOMWARELIVE_TLP=TLP:CLEAR
      # Client-side pacing: minimum seconds between API calls. Each group hits
      # several endpoints, so raise this if you hit the PRO rate limit / get
      # your IP blocked; 0 disables pacing. Default 1.5.
      - RANSOMWARELIVE_REQUEST_DELAY=1.5
      # feature toggles (default true)
      - RANSOMWARELIVE_ENABLE_TOOLS=true
      - RANSOMWARELIVE_ENABLE_TTPS=true
      - RANSOMWARELIVE_ENABLE_CVES=true
      - RANSOMWARELIVE_ENABLE_YARA=true
      - RANSOMWARELIVE_ENABLE_IOCS=true
      - RANSOMWARELIVE_ENABLE_LOCATIONS=true       # leak-site domains
      - RANSOMWARELIVE_ENABLE_RANSOMNOTES=true     # ransom notes as File observables
      - RANSOMWARELIVE_ENABLE_CVE_MATRIX=true      # CVEs from Ransomware-Vulnerability-Matrix (no PRO CVE endpoint exists)
      # create a stub AttackPattern (with its tactic) when a technique isn't
      # already imported by the MITRE connector, so the ATT&CK matrix populates
      # instead of staying empty. Set false only if the MITRE ATT&CK dataset is
      # imported in OpenCTI and you want strict dedup against it.
      - RANSOMWARELIVE_CREATE_MISSING_TTP=true
      # optional: restrict to specific groups, comma separated (blank = all)
      - RANSOMWARELIVE_ONLY_GROUPS=
    restart: always
    # If OpenCTI runs in its own compose network, attach this connector to it:
    # networks:
    #   - opencti-net
# networks:
#   opencti-net:
#     external: true
